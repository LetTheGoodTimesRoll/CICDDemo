name: Android CI/CD

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    name: CI - 构建
    runs-on: ubuntu-latest

    steps:
      # 构建开始通知
      - name: 飞书通知 - 开始构建
        run: |
          curl -s -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"🔨 [CICDDemo] 开始构建\\n分支：${{ github.ref_name }}\\n提交：${{ github.sha }}\\n提交信息：${{ github.event.head_commit.message }}\\n触发人：${{ github.actor }}\\n详情：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}}"

      # 检出完整 git 历史，支持版本号计算
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 配置 JDK 21（与 gradle-daemon-jvm.properties 一致）
      - name: 配置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 缓存 Gradle 依赖，以构建文件哈希为键
      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 赋予 gradlew 执行权限
      - name: 授予 Gradle Wrapper 执行权限
        run: chmod +x ./gradlew

      # 构建 Debug APK
      - name: 构建 Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 上传 Debug APK
      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      # 发送飞书通知
      - name: 飞书通知 - CI 构建结果
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then ICON="✅"; TEXT="构建成功"; else ICON="❌"; TEXT="构建失败"; fi
          curl -s -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"${ICON} [CICDDemo] CI ${TEXT}\\n分支：${{ github.ref_name }}\\n提交：${{ github.sha }}\\n提交信息：${{ github.event.head_commit.message }}\\n详情：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}}"

  release:
    name: CD - 发布 Release
    runs-on: ubuntu-latest
    needs: build
    # 仅 push 到主分支时触发，PR 不触发
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write  # 允许创建 GitHub Release

    steps:
      # 检出完整 git 历史
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 配置 JDK 21
      - name: 配置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 缓存 Gradle 依赖
      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 赋予 gradlew 执行权限
      - name: 授予 Gradle Wrapper 执行权限
        run: chmod +x ./gradlew

      # 构建签名 Release APK（使用仓库内的 app/platform.keystore）
      - name: 构建 Release APK（签名）
        run: ./gradlew assembleRelease --stacktrace

      # 使用 GitHub CLI 创建 Release 并上传 APK
      - name: 创建 GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          gh release create "$VERSION" \
            app/build/outputs/apk/release/*.apk \
            --title "Release $VERSION" \
            --generate-notes

      # 发送飞书通知
      - name: 飞书通知 - CD 发布结果
        if: always()
        run: |
          STATUS="${{ job.status }}"
          VERSION="v1.0.${{ github.run_number }}"
          if [ "$STATUS" = "success" ]; then
            ICON="🚀"; TEXT="Release ${VERSION} 发布成功。\n提交信息：${{ github.event.head_commit.message }}\n下载：https://github.com/${{ github.repository }}/releases/tag/${VERSION}"
          else
            ICON="❌"; TEXT="Release ${VERSION} 发布失败。\n提交信息：${{ github.event.head_commit.message }}\n详情：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -s -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"${ICON} [CICDDemo] ${TEXT}\"}}"
